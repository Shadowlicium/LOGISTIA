#cloud-config
users:
  - name: ubuntu
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    groups: sudo
    shell: /bin/bash

packages:
  - python3
  - python3-pip

runcmd:
  - [ sh, -c, 'echo "127.0.0.1 localhost" >> /etc/hosts' ]
  - [ sh, -c, 'apt-get update -y' ]
  - [ sh, -c, 'apt-get install -y apache2' ]
  - [ systemctl, enable, apache2 ]
  - [ systemctl, start, apache2 ]
