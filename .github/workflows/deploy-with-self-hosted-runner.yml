name: Deploy with Self-Hosted Runner

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
      run_ansible:
        description: "Run Ansible after Terraform"
        required: true
        default: true
        type: boolean
      deploy_backup:
        description: "Create and configure the backup server"
        required: true
        default: true
        type: boolean

concurrency:
  group: logistia-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      TF_VAR_proxmox_url: ${{ secrets.PROXMOX_URL }}
      TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
      TF_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_deploy_backup: ${{ inputs.deploy_backup }}
      ANSIBLE_MAIL_VARS: ${{ secrets.ANSIBLE_MAIL_VARS }}
      ANSIBLE_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
      ANSIBLE_DEPLOY_BACKUP: ${{ inputs.deploy_backup }}
      TERRAFORM_STATE_PATH: ${{ vars.TERRAFORM_STATE_PATH }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check required secrets
        run: |
          test -n "$TF_VAR_proxmox_url"
          test -n "$TF_VAR_proxmox_user"
          test -n "$TF_VAR_proxmox_password"
          test -n "$TF_VAR_ssh_public_key"

      - name: Check required Ansible secrets
        if: ${{ inputs.run_ansible && inputs.terraform_action == 'apply' }}
        run: |
          test -n "$ANSIBLE_SSH_PRIVATE_KEY"
          test -n "$ANSIBLE_MAIL_VARS"

      - name: Check runner prerequisites
        run: |
          command -v python3
          python3 -m venv --help >/dev/null
          command -v ssh-keygen

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare Terraform state path
        run: |
          state_path="${TERRAFORM_STATE_PATH:-/srv/logistia/terraform/terraform.tfstate}"
          state_dir="$(dirname "$state_path")"
          if [ ! -d "$state_dir" ]; then
            echo "::error::Create the persistent Terraform state directory first: $state_dir"
            exit 1
          fi
          if [ ! -w "$state_dir" ]; then
            echo "::error::The runner user must be able to write to: $state_dir"
            exit 1
          fi
          echo "TF_STATE_PATH=$state_path" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform init -input=false -backend-config="path=$TF_STATE_PATH"
        working-directory: infra/terraform

      - name: Protect existing optional container state
        run: |
          check_optional_state() {
            local enabled="$1"
            local module_name="$2"
            local input_name="$3"
            if [ "$enabled" != "true" ]; then
              if terraform state list 2>/dev/null | grep -Eq "^module\.${module_name}($|\[)"; then
                echo "::error::${input_name}=false would remove an existing container from Terraform. Keep it true or move/import the state before disabling it."
                exit 1
              fi
            fi
          }

          check_optional_state "$TF_VAR_deploy_backup" "vm_backup" "deploy_backup"
        working-directory: infra/terraform

      - name: Terraform plan
        run: terraform plan -input=false -out=plan.tfplan
        working-directory: infra/terraform

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform apply -auto-approve plan.tfplan
        working-directory: infra/terraform

      - name: Install Ansible
        if: ${{ inputs.run_ansible && inputs.terraform_action == 'apply' }}
        run: |
          python3 -m venv "$RUNNER_TEMP/ansible-venv"
          "$RUNNER_TEMP/ansible-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/ansible-venv/bin/python" -m pip install ansible
          "$RUNNER_TEMP/ansible-venv/bin/ansible-galaxy" collection install -r ansible/requirements.yml

      - name: Configure SSH key for Ansible
        if: ${{ inputs.run_ansible && inputs.terraform_action == 'apply' }}
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$ANSIBLE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub

      - name: Create local Ansible variables files
        if: ${{ inputs.run_ansible && inputs.terraform_action == 'apply' }}
        run: |
          umask 077
          mkdir -p ansible/group_vars
          {
            printf 'admin_ssh_public_key: >-\n  %s\n' "$ANSIBLE_ADMIN_SSH_PUBLIC_KEY"
            printf 'disable_password_ssh_login: true\n'
            printf 'deploy_backup: %s\n' "$ANSIBLE_DEPLOY_BACKUP"
            printf 'backup_enabled: %s\n' "$ANSIBLE_DEPLOY_BACKUP"
            printf 'mail_log_forwarding_enabled: true\n'
            printf 'mail_log_ai_host: 10.10.40.11\n'
            printf 'mail_log_ai_port: 514\n'
          } > ansible/group_vars/all.yml
          printf '%s\n' "$ANSIBLE_MAIL_VARS" > ansible/group_vars/mail.yml

      - name: Wait for SSH on containers
        if: ${{ inputs.run_ansible && inputs.terraform_action == 'apply' }}
        run: |
          target="managed_containers"
          [ "$ANSIBLE_DEPLOY_BACKUP" = "true" ] || target="${target}:!backups"
          "$RUNNER_TEMP/ansible-venv/bin/ansible" "$target" -i inventory.ini -m wait_for_connection -a "timeout=300"
        working-directory: ansible

      - name: Run Ansible playbook
        if: ${{ inputs.run_ansible && inputs.terraform_action == 'apply' }}
        timeout-minutes: 45
        run: |
          limit="all"
          [ "$ANSIBLE_DEPLOY_BACKUP" = "true" ] || limit="${limit}:!backups"
          limit_args=(--limit "$limit")
          ANSIBLE_ROLES_PATH=roles "$RUNNER_TEMP/ansible-venv/bin/ansible-playbook" -i inventory.ini playbooks/site.yml "${limit_args[@]}"
        working-directory: ansible
