---
- name: Install GitHub Runner dependencies
  apt:
    name:
      - curl
      - wget
      - jq
      - unzip
      - git
      - build-essential
    state: present

- name: Create GitHub Runner service user
  user:
    name: github-runner
    shell: /bin/bash
    create_home: yes
    home: /home/github-runner

- name: Create runner directory
  file:
    path: /opt/github-runner
    state: directory
    owner: github-runner
    group: github-runner
    mode: '0755'

- name: Display GitHub Runner setup instructions
  debug:
    msg: |
      GitHub runner prerequisites are installed.
      Finish the runner registration with the official commands from:
      GitHub repository -> Settings -> Actions -> Runners -> New self-hosted runner.
      Use Linux x64 and run the displayed commands on gh-runner.
