---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Apache
  apt:
    name: apache2
    state: present

- name: Ensure apache is enabled and started
  service:
    name: apache2
    state: started
    enabled: yes

- name: Deploy simple index.html
  copy:
    dest: /var/www/html/index.html
    content: "<h1>LOGISTIA - Serveur Web</h1>"
    owner: root
    group: root
    mode: '0644'
