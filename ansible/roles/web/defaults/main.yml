---
roundcube_enabled: true
roundcube_twofactor_plugin_enabled: true
roundcube_twofactor_plugin_version: master

logistia_app_config_enabled: true
logistia_db_host: "{{ db_host }}"
logistia_db_port: "{{ db_port | default(5432) }}"
logistia_db_name: "{{ db_name }}"
logistia_db_user: "{{ db_user }}"
logistia_db_password: "{{ db_password }}"

postfixadmin_enabled: false
postfixadmin_version: "3.3.13"
postfixadmin_archive_url: "https://github.com/postfixadmin/postfixadmin/archive/refs/tags/postfixadmin-{{ postfixadmin_version }}.tar.gz"
postfixadmin_extract_path: "/opt/postfixadmin-postfixadmin-{{ postfixadmin_version }}"
postfixadmin_setup_password_hash: ""
postfixadmin_password_scheme: "php_crypt:SHA512"
