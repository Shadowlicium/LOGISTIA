---
- name: Install docker and docker-compose
  apt:
    name: ["docker.io","docker-compose"]
    state: present

- name: Clone mailcow-dockerized
  git:
    repo: https://github.com/mailcow/mailcow-dockerized.git
    dest: /opt/mailcow
    version: master

- name: Run mailcow (requires configuration)
  debug:
    msg: "mailcow cloned to /opt/mailcow — complete configuration manually or add templates to automate env file and run docker-compose up -d"

# Mailcow uses docker-compose; for production automatiser la génération du mailcow.conf
