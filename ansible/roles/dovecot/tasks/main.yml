---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Dovecot packages
  apt:
    name:
      - dovecot-core
      - dovecot-imapd
      - dovecot-pop3d
      - dovecot-lmtpd
    state: present
    update_cache: yes

- name: Ensure mail users are provided from protected variables
  assert:
    that:
      - mail_users is defined
      - mail_users | length > 0
      - mail_users | selectattr('name', 'defined') | list | length == mail_users | length
      - mail_users | selectattr('password', 'defined') | list | length == mail_users | length
    fail_msg: "Define mail_users in ansible/group_vars/mail.yml, preferably encrypted with ansible-vault."

- name: Ensure SSL directories exist
  file:
    path: /etc/ssl/private
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Create self-signed certificate for Dovecot (if absent)
  command: >
    openssl req -new -x509 -days 365 -nodes -subj "/CN={{ ansible_fqdn | default('mail.local') }}" \
    -out /etc/ssl/certs/dovecot.pem -keyout /etc/ssl/private/dovecot.pem
  args:
    creates: /etc/ssl/certs/dovecot.pem

- name: Create local mail users
  user:
    name: "{{ item.name }}"
    comment: "Mail user {{ item.name }}"
    shell: /bin/bash
    create_home: yes
    password: "{{ item.password | password_hash('sha512') }}"
  loop: "{{ mail_users }}"
  no_log: true

- name: Ensure Maildir root directories exist for mail users
  file:
    path: "/home/{{ item.name }}/Maildir"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0700'
  loop: "{{ mail_users }}"

- name: Ensure Maildir subdirectories exist for mail users
  file:
    path: "/home/{{ item.0.name }}/Maildir/{{ item.1 }}"
    state: directory
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
    mode: '0700'
  loop: "{{ mail_users | product(['new', 'cur', 'tmp']) | list }}"

- name: Deploy Dovecot config with LMTP socket for Postfix
  copy:
    dest: /etc/dovecot/dovecot.conf
    content: |
      disable_plaintext_auth = yes
      mail_location = maildir:~/Maildir
      protocols = imap pop3 lmtp
      ssl = required
      ssl_cert = </etc/ssl/certs/dovecot.pem
      ssl_key = </etc/ssl/private/dovecot.pem
      auth_mechanisms = plain login

      passdb {
        driver = pam
      }

      userdb {
        driver = passwd
      }

      service auth {
        unix_listener /var/spool/postfix/private/auth {
          mode = 0660
          user = postfix
          group = postfix
        }
      }

      service lmtp {
        unix_listener /var/spool/postfix/private/dovecot-lmtp {
          mode = 0600
          user = postfix
          group = postfix
        }
      }
    owner: root
    group: root
    mode: '0644'
  notify: Restart dovecot

- name: Ensure dovecot service is enabled and started
  service:
    name: dovecot
    state: started
    enabled: yes
