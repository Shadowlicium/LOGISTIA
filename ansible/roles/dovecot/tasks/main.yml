---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Dovecot packages
  apt:
    name:
      - dovecot-core
      - dovecot-imapd
      - dovecot-pop3d
      - dovecot-lmtpd
    state: present
    update_cache: yes

- name: Ensure SSL directories exist
  file:
    path: /etc/ssl/private
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Create self-signed certificate for Dovecot (if absent)
  command: >
    openssl req -new -x509 -days 365 -nodes -subj "/CN={{ ansible_fqdn | default('mail.local') }}" \
    -out /etc/ssl/certs/dovecot.pem -keyout /etc/ssl/private/dovecot.pem
  args:
    creates: /etc/ssl/certs/dovecot.pem

- name: Create local mail users
  user:
    name: "{{ item.name }}"
    comment: "Mail user {{ item.name }}"
    shell: /bin/bash
    create_home: yes
    password: "{{ item.password | password_hash('sha512') }}"
  loop:
    - { name: celia, password: "Celia1234!" }
    - { name: christopher, password: "Chris1234!" }
    - { name: norada, password: "Norada1234!" }
    - { name: arthur, password: "Arthur1234!" }

- name: Ensure Maildir directories exist for mail users
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "{{ item.mode }}"
  loop:
    - { user: celia, path: /home/celia/Maildir, mode: '0700' }
    - { user: celia, path: /home/celia/Maildir/new, mode: '0700' }
    - { user: celia, path: /home/celia/Maildir/cur, mode: '0700' }
    - { user: celia, path: /home/celia/Maildir/tmp, mode: '0700' }
    - { user: christopher, path: /home/christopher/Maildir, mode: '0700' }
    - { user: christopher, path: /home/christopher/Maildir/new, mode: '0700' }
    - { user: christopher, path: /home/christopher/Maildir/cur, mode: '0700' }
    - { user: christopher, path: /home/christopher/Maildir/tmp, mode: '0700' }
    - { user: norada, path: /home/norada/Maildir, mode: '0700' }
    - { user: norada, path: /home/norada/Maildir/new, mode: '0700' }
    - { user: norada, path: /home/norada/Maildir/cur, mode: '0700' }
    - { user: norada, path: /home/norada/Maildir/tmp, mode: '0700' }
    - { user: arthur, path: /home/arthur/Maildir, mode: '0700' }
    - { user: arthur, path: /home/arthur/Maildir/new, mode: '0700' }
    - { user: arthur, path: /home/arthur/Maildir/cur, mode: '0700' }
    - { user: arthur, path: /home/arthur/Maildir/tmp, mode: '0700' }

- name: Deploy Dovecot config with LMTP socket for Postfix
  copy:
    dest: /etc/dovecot/dovecot.conf
    content: |
      disable_plaintext_auth = yes
      mail_location = maildir:~/Maildir
      protocols = imap pop3 lmtp
      ssl = required
      ssl_cert = </etc/ssl/certs/dovecot.pem
      ssl_key = </etc/ssl/private/dovecot.pem
      auth_mechanisms = plain login

      passdb {
        driver = pam
      }

      userdb {
        driver = passwd
      }

      service auth {
        unix_listener /var/spool/postfix/private/auth {
          mode = 0660
          user = postfix
          group = postfix
        }
      }

      service lmtp {
        unix_listener /var/spool/postfix/private/dovecot-lmtp {
          mode = 0600
          user = postfix
          group = postfix
        }
      }
    owner: root
    group: root
    mode: '0644'
  notify: Restart dovecot

- name: Ensure dovecot service is enabled and started
  service:
    name: dovecot
    state: started
    enabled: yes

handlers:
  - name: Restart dovecot
    service:
      name: dovecot
      state: restarted
