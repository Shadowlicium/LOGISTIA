---
- name: Ensure Dovecot SQL variables are provided
  assert:
    that:
      - db_password is defined
      - db_password | length > 0
    fail_msg: "Define db_password in ansible/group_vars/mail.yml or ANSIBLE_MAIL_VARS."

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
    lock_timeout: 120

- name: Install Dovecot SQL packages
  apt:
    name:
      - dovecot-core
      - dovecot-imapd
      - dovecot-lmtpd
      - dovecot-pgsql
      - openssl
    state: present
    lock_timeout: 120

- name: Create vmail group
  group:
    name: vmail
    gid: "{{ vmail_gid }}"
    state: present

- name: Create vmail user
  user:
    name: vmail
    uid: "{{ vmail_uid }}"
    group: vmail
    home: "{{ mail_vhost_base }}"
    shell: /usr/sbin/nologin
    create_home: yes
    system: yes
    state: present

- name: Ensure SSL directories exist
  file:
    path: /etc/ssl/private
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Create self-signed certificate for Dovecot if absent
  command: >
    openssl req -new -x509 -days 365 -nodes -subj "/CN={{ ansible_fqdn | default('mail.local') }}"
    -out /etc/ssl/certs/dovecot.pem -keyout /etc/ssl/private/dovecot.pem
  args:
    creates: /etc/ssl/certs/dovecot.pem

- name: Deploy Dovecot SQL configuration
  template:
    src: dovecot-sql.conf.ext.j2
    dest: /etc/dovecot/dovecot-sql.conf.ext
    owner: root
    group: dovecot
    mode: '0640'
  notify: Restart dovecot
  no_log: true

- name: Deploy Dovecot virtual mailbox configuration
  copy:
    dest: /etc/dovecot/dovecot.conf
    content: |
      protocols = imap lmtp
      listen = *
      disable_plaintext_auth = yes
      auth_mechanisms = plain login

      ssl = required
      ssl_cert = </etc/ssl/certs/dovecot.pem
      ssl_key = </etc/ssl/private/dovecot.pem

      mail_uid = {{ vmail_uid }}
      mail_gid = {{ vmail_gid }}
      first_valid_uid = {{ vmail_uid }}
      last_valid_uid = {{ vmail_uid }}
      mail_location = maildir:{{ mail_vhost_base }}/%d/%n

      passdb {
        driver = sql
        args = /etc/dovecot/dovecot-sql.conf.ext
      }

      userdb {
        driver = sql
        args = /etc/dovecot/dovecot-sql.conf.ext
      }

      service auth {
        unix_listener /var/spool/postfix/private/auth {
          mode = 0660
          user = postfix
          group = postfix
        }
      }

      service lmtp {
        unix_listener /var/spool/postfix/private/dovecot-lmtp {
          mode = 0600
          user = postfix
          group = postfix
        }
      }

      protocol lmtp {
        postmaster_address = postmaster@{{ mail_domain }}
      }
    owner: root
    group: root
    mode: '0644'
  notify: Restart dovecot

- name: Ensure dovecot service is enabled and started
  service:
    name: dovecot
    state: started
    enabled: yes
