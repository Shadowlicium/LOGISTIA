[proxmox_nodes]
proxmox ansible_host=192.168.160.200 ansible_user=root

[webservers]
web ansible_host=10.10.10.10 ansible_user=root

[monitoring]
grafana ansible_host=10.10.40.10 ansible_user=root

[mail_relays]
mail-relay ansible_host=10.10.10.12 ansible_user=root

[databases]
db ansible_host=10.10.20.10 ansible_user=root

[mailservers]
mail-data ansible_host=10.10.20.12 ansible_user=root

[ai]
ollama ansible_host=10.10.40.11 ansible_user=root

[runners]
gh-runner ansible_host=10.10.30.10 ansible_user=root

[backups]
backup ansible_host=10.10.99.10 ansible_user=root

[dmz:children]
webservers
mail_relays

[database_zone:children]
databases
mailservers

[security_zone:children]
monitoring
ai

[mail:children]
mail_relays
mailservers

[cicd:children]
runners

[backup_zone:children]
backups

[all:vars]
ansible_python_interpreter=/usr/bin/python3
# Password-based authentication: run with --ask-pass flag
# Example: ansible-playbook -i inventory.ini playbooks/site.yml --ask-pass
