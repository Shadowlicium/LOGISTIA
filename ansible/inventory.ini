[proxmox_nodes]
proxmox ansible_host=192.168.160.100 ansible_user=root

[webservers]
web ansible_host=10.10.10.10 ansible_user=root machine_user=web-apache

[monitoring]
grafana ansible_host=10.10.40.10 ansible_user=root machine_user=grafana

[mail_relays]
mail-relay ansible_host=10.10.10.12 ansible_user=root machine_user=mail-relay

[databases]
db ansible_host=10.10.20.10 ansible_user=root machine_user=db-postgres

[mailservers]
mail-data ansible_host=10.10.20.12 ansible_user=root machine_user=mail-data

[ai]
ollama ansible_host=10.10.40.11 ansible_user=root machine_user=ollama-ia

[backups]
backup ansible_host=10.10.99.10 ansible_user=root machine_user=backup

[dmz:children]
webservers
mail_relays

[database_zone:children]
databases
mailservers

[security_zone:children]
monitoring
ai

[mail:children]
mail_relays
mailservers
databases

[backup_zone:children]
backups

[managed_containers:children]
webservers
monitoring
mail_relays
databases
mailservers
ai
backups

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# Terraform injects the matching public key into root.
# The users role then creates the machine-specific administration users.
